<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Font & Color Editor for Telegram</title>
    <style>
        @font-face {
            font-family: 'CustomFont21063';
            src: url('21063.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'CustomFont20552';
            src: url('20552.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0914;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            padding: 20px;
        }

        .slider-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            padding: 30px 24px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
        }

        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        .custom-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .custom-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }

        .control-box {
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .control-label {
            font-size: 12px;
            color: #8a8a9e;
            min-width: 50px;
            text-align: left;
        }

        .range-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            border-radius: 4px;
            outline: none;
        }

        #sizeSlider {
            background: rgba(255, 255, 255, 0.1);
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .range-slider::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }

        #colorSlider {
            background: linear-gradient(to right, #ff0000 0%, #ffff00 17%, #00ff00 33%, #00ffff 50%, #0000ff 67%, #ff00ff 83%, #ff0000 100%);
        }

        #brightnessSlider {
            background: linear-gradient(to right, #000000, #ffffff);
        }

        .color-picker-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, margin 0.3s ease-out;
            opacity: 0;
        }

        .color-picker-panel.open {
            max-height: 140px;
            margin-bottom: 15px;
            opacity: 1;
        }

        .slider-wrapper {
            overflow: hidden;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .font-card {
            padding: 30px 15px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .font-preview {
            font-size: 48px;
            line-height: 1.3;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            word-break: break-word;
            text-align: center;
            padding: 0 15px;
        }

        .font-name {
            font-size: 14px;
            color: #636370;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px;
            border-radius: 18px;
            margin-bottom: 20px;
        }

        .left-tools {
            display: flex;
            gap: 6px;
        }

        .align-btn, .palette-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #636370;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .align-btn svg, .palette-btn svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        .align-btn svg path, .palette-btn svg path {
            fill: currentColor;
        }

        .align-btn.active, .palette-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .color-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
        }

        .nav-group {
            display: flex;
            gap: 6px;
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .nav-btn:active, .align-btn:active, .palette-btn:active {
            transform: scale(0.95);
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #0b0914;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .action-btn:active {
            background: #e0e0e0;
            transform: scale(0.98);
        }

        @media (hover: hover) {
            .nav-btn:hover { background: rgba(255, 255, 255, 0.1); }
            .align-btn:hover, .palette-btn:hover { color: #fff; }
            .action-btn:hover { background: #f0f0f0; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        
        <div class="input-box">
            <input type="text" id="textInput" class="custom-input" placeholder="Введите свой текст...">
        </div>

        <div class="control-box">
            <span class="control-label">Размер</span>
            <input type="range" id="sizeSlider" class="range-slider" min="16" max="100" value="48">
            <span class="control-label" id="sizeLabel" style="min-width:35px; text-align:right;">48px</span>
        </div>

        <div class="color-picker-panel" id="colorPanel">
            <div class="control-box">
                <span class="control-label">Цвет</span>
                <input type="range" id="colorSlider" class="range-slider" min="0" max="360" value="0">
                <span class="control-label" style="min-width:20px; text-align:right;"><span class="color-indicator" id="indicator"></span></span>
            </div>
            <div class="control-box">
                <span class="control-label">Яркость</span>
                <input type="range" id="brightnessSlider" class="range-slider" min="15" max="100" value="100">
                <span class="control-label" id="brightLabel" style="min-width:35px; text-align:right;">100%</span>
            </div>
        </div>

        <div class="slider-wrapper">
            <div class="font-card">
                <div class="font-preview" id="fontPreview">Aa</div>
                <div class="font-name" id="fontName">21063.otf</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="left-tools">
                <button class="align-btn" data-align="left" id="alignLeft">
                    <svg viewBox="0 0 24 24"><path d="M3 15h18v2H3zm0-4h12v2H3zm0-4h18v2H3zm0 12h12v2H3z"/></svg>
                </button>
                <button class="align-btn active" data-align="center" id="alignCenter">
                    <svg viewBox="0 0 24 24"><path d="M3 15h18v2H3zm4-4h10v2H7zm-4-4h18v2H3zm4 12h10v2H7z"/></svg>
                </button>
                <button class="align-btn" data-align="right" id="alignRight">
                    <svg viewBox="0 0 24 24"><path d="M3 15h18v2H3zm6-4h12v2H9zm-6-4h18v2H3zm6 12h12v2H9z"/></svg>
                </button>
                
                <button class="palette-btn" id="paletteBtn">
                    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-10 10c0 5.523 4.477 10 10 10a1 1 0 0 0 1-1v-1.5a2.5 2.5 0 0 1 2.5-2.5H19a3 3 0 0 0 3-3c0-6.627-4.477-11-10-11zm-5.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm4.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3.5 3.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/></svg>
                </button>
            </div>

            <div class="nav-group">
                <button class="nav-btn" id="prevBtn">&#10094;</button>
                <button class="nav-btn" id="nextBtn">&#10095;</button>
            </div>
        </div>

        <button class="action-btn" id="applyBtn">Сделать</button>
    </div>

    <div id="downloadModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 9, 20, 0.95); z-index: 10000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 24px; border-radius: 24px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
            </div>
    </div>

    <script>
        const fontsData = [
            {
                name: "21063.otf",
                fontFamily: "CustomFont21063",
                defaultText: "Aa"
            },
            {
                name: "20552.otf",
                fontFamily: "CustomFont20552",
                defaultText: "Aa"
            }
        ];

        let currentIndex = 0;
        let currentHue = 0;
        let currentBrightness = 100;
        let currentAlignment = 'center';

        const fontPreview = document.getElementById('fontPreview');
        const fontName = document.getElementById('fontName');
        const textInput = document.getElementById('textInput');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeLabel = document.getElementById('sizeLabel');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const applyBtn = document.getElementById('applyBtn');
        const alignButtons = document.querySelectorAll('.align-btn');

        const paletteBtn = document.getElementById('paletteBtn');
        const colorPanel = document.getElementById('colorPanel');
        const colorSlider = document.getElementById('colorSlider');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const brightLabel = document.getElementById('brightLabel');
        const indicator = document.getElementById('indicator');

        function updateSlider(index) {
            const currentFont = fontsData[index];
            fontName.textContent = currentFont.name;
            fontPreview.style.fontFamily = currentFont.fontFamily;
            
            if (textInput.value.trim() === "") {
                fontPreview.textContent = currentFont.defaultText;
            } else {
                fontPreview.textContent = textInput.value;
            }
        }

        function updateTextColor() {
            const hslColor = `hsl(${currentHue}, 100%, ${currentBrightness}%)`;
            fontPreview.style.color = hslColor;
            indicator.style.backgroundColor = hslColor;
            brightnessSlider.style.background = `linear-gradient(to right, #000000, hsl(${currentHue}, 100%, 50%), #ffffff)`;
        }

        paletteBtn.addEventListener('click', () => {
            paletteBtn.classList.toggle('active');
            colorPanel.classList.toggle('open');
        });

        colorSlider.addEventListener('input', (e) => {
            currentHue = e.target.value;
            updateTextColor();
        });

        brightnessSlider.addEventListener('input', (e) => {
            currentBrightness = e.target.value;
            brightLabel.textContent = `${currentBrightness}%`;
            updateTextColor();
        });

        sizeSlider.addEventListener('input', (e) => {
            const currentSize = e.target.value;
            fontPreview.style.fontSize = `${currentSize}px`;
            sizeLabel.textContent = `${currentSize}px`;
        });

        textInput.addEventListener('input', () => {
            updateSlider(currentIndex);
        });

        alignButtons.forEach(button => {
            button.addEventListener('click', () => {
                alignButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentAlignment = button.getAttribute('data-align');
                fontPreview.style.textAlign = currentAlignment;
            });
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex === 0) ? fontsData.length - 1 : currentIndex - 1;
            updateSlider(currentIndex);
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex === fontsData.length - 1) ? 0 : currentIndex + 1;
            updateSlider(currentIndex);
        });

        // МОЩНАЯ ГЕНЕРАЦИЯ ПОД СМАРТФОНЫ И ТЕЛЕГРАМ С ТОЧНЫМИ ОТСТУПАМИ И ПЕРЕНОСОМ ТЕКСТА
        applyBtn.addEventListener('click', () => {
            const textToRender = fontPreview.textContent;
            const activeFont = fontsData[currentIndex];
            const userSize = parseInt(sizeSlider.value);
            
            const scaleFactor = 5; 
            const basePadding = 35; // Твоя безопасная рамка-пустота 35px
            const canvasPadding = basePadding * scaleFactor; // 175px на итоговой картинке

            // Получаем точные CSS-размеры блока превью с экрана телефона
            const previewRect = fontPreview.getBoundingClientRect();
            const computedStyle = window.getComputedStyle(fontPreview);
            
            const paddingLeft = parseFloat(computedStyle.paddingLeft) || 0;
            const paddingRight = parseFloat(computedStyle.paddingRight) || 0;
            const previewTextWidth = previewRect.width - paddingLeft - paddingRight;

            document.fonts.ready.then(() => {
                // Виртуально рассчитываем строки точно так же, как они выглядят в превью
                const testCanvas = document.createElement('canvas');
                const testCtx = testCanvas.getContext('2d');
                const fontSize = userSize * scaleFactor;
                testCtx.font = `${fontSize}px "${activeFont.fontFamily}"`;

                const maxCanvasTextWidth = previewTextWidth * scaleFactor;

                const words = textToRender.split(' ');
                const lines = [];
                let currentLine = '';

                for (let i = 0; i < words.length; i++) {
                    let testLine = currentLine + words[i] + ' ';
                    let metrics = testCtx.measureText(testLine);

                    if (metrics.width > maxCanvasTextWidth && i > 0) {
                        lines.push(currentLine.trim());
                        currentLine = words[i] + ' ';
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine.trim());

                const lineHeightRatio = 1.3; 
                const lineHeight = fontSize * lineHeightRatio;
                const totalTextHeight = lines.length * lineHeight;

                // Создаем холст под реальный размер текста с рамками
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                canvas.width = maxCanvasTextWidth + (canvasPadding * 2);
                canvas.height = totalTextHeight + (canvasPadding * 2);

                ctx.font = `${fontSize}px "${activeFont.fontFamily}"`;
                ctx.fillStyle = `hsl(${currentHue}, 100%, ${currentBrightness}%)`;
                ctx.textBaseline = 'top'; 

                let xPos = canvasPadding;
                if (currentAlignment === 'center') {
                    ctx.textAlign = 'center';
                    xPos = canvas.width / 2;
                } else if (currentAlignment === 'right') {
                    ctx.textAlign = 'right';
                    xPos = canvas.width - canvasPadding;
                } else {
                    ctx.textAlign = 'left';
                }

                let yPos = canvasPadding;
                lines.forEach(line => {
                    ctx.fillText(line, xPos, yPos);
                    yPos += lineHeight;
                });

                // Преобразуем холст в надежную Data URL строку (Base64)
                const dataUrl = canvas.toDataURL('image/png');

                // Получаем и пересобираем модалку для вызова нативного сохранения ТГ
                const downloadModal = document.getElementById('downloadModal');
                const modalContainer = downloadModal.querySelector('div');

                modalContainer.innerHTML = `
                    <h3 style="margin-bottom: 8px; font-size: 18px; font-weight: 600; color: #ffffff;">Картинка готова!</h3>
                    <p style="font-size: 13px; color: #8a8a9e; margin-bottom: 16px;">Зажми пальцем изображение ниже и выбери <br><b style="color: #fff;">«Сохранить в Фото»</b> или <br><b style="color: #fff;">«Сохранить изображение»</b></p>
                    
                    <div style="background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 12px; margin-bottom: 16px; max-height: 260px; overflow-y: auto; display: flex; justify-content: center; align-items: center;">
                        <img src="${dataUrl}" style="max-width: 100%; max-height: 230px; object-fit: contain; border-radius: 8px; display: block;" alt="Text Preview">
                    </div>

                    <button id="closeModalBtn" style="width: 100%; padding: 14px; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #ffffff; border-radius: 14px; font-size: 14px; cursor: pointer; font-weight: 600; transition: background 0.2s;">Закрыть</button>
                `;

                // Открываем модальное окно
                downloadModal.style.display = 'flex';

                // Навешиваем событие закрытия
                document.getElementById('closeModalBtn').onclick = () => {
                    downloadModal.style.display = 'none';
                };
            });
        });

        // Старт инициализации
        updateSlider(currentIndex);
        updateTextColor();
    </script>
</body>
</html>
